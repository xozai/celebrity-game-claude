name: Release Please

on:
  push:
    branches:
      - main

# release-please needs to create commits (for the release PR) and PRs.
# These permissions are granted to GITHUB_TOKEN automatically on public repos
# when Actions settings allow it. If release PRs never appear, check:
#   Settings > Actions > General > Workflow permissions → "Read and write permissions"
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # release-type, bump flags, and changelog sections live in
          # release-please-config.json at the repo root.
