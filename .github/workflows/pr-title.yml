name: PR Title Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint-pr-title:
    name: Lint PR title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed commit types (must match release-please-config.json changelog-sections)
          types: |
            feat
            fix
            docs
            refactor
            test
            chore
            perf
            ci
            style
            build
          # Scopes are optional — add your own here if you want to enforce them
          requireScope: false
          # Allow breaking-change indicator anywhere in the title (feat!: ...)
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: >
            The subject "{subject}" found in the pull request title "{title}" didn't match the
            required pattern. Please ensure that the subject doesn't start with an uppercase letter.
